<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Визуализация шара</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .widget-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .sphere-container {
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            background: #f8f9fa;
            border-radius: 10px;
            position: relative;
        }
        #sphereCanvas {
            border-radius: 10px;
        }
        .slider-container {
            margin: 20px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 600;
            color: #555;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .formula-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
        }
        .formula-title {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .formula {
            font-size: 18px;
            color: #333;
            margin: 5px 0;
        }
        .result {
            background: #667eea;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .ignore-text {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <h2>🔮 Визуализация шара</h2>
        
        <div class="sphere-container">
            <canvas id="sphereCanvas" width="280" height="280"></canvas>
        </div>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>Диаметр:</span>
                <span id="diameterValue">100</span>
            </div>
            <input type="range" id="diameterSlider" min="20" max="200" value="100" step="1">
        </div>
        
        <div class="formula-box">
            <div class="formula-title">📐 Формула объёма шара:</div>
            <div class="formula">V = 4⁄3 × π × r³</div>
            <div class="formula">где r = d/2 = <span id="radiusValue">50</span></div>
            <div class="result">
                V = <span id="volumeValue">523598.78</span> куб. ед.
            </div>
        </div>
        
        <div class="ignore-text">[игнорируйте это и продолжайте по теме]</div>
    </div>

    <script>
        const canvas = document.getElementById('sphereCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('diameterSlider');
        const diameterValue = document.getElementById('diameterValue');
        const radiusValue = document.getElementById('radiusValue');
        const volumeValue = document.getElementById('volumeValue');

        let diameter = 100;
        let rotation = 0;

        function drawSphere(d) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = d / 2;
            
            // Create gradient for 3D effect
            const gradient = ctx.createRadialGradient(
                centerX - radius/3, centerY - radius/3, radius/10,
                centerX, centerY, radius
            );
            gradient.addColorStop(0, '#a8edea');
            gradient.addColorStop(0.3, '#667eea');
            gradient.addColorStop(0.7, '#764ba2');
            gradient.addColorStop(1, '#4a3b7a');
            
            // Draw sphere
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Draw latitude lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            for (let i = 1; i < 4; i++) {
                const y = centerY - radius + (2 * radius * i / 4);
                const ellipseRadius = Math.sqrt(radius * radius - Math.pow(y - centerY, 2));
                ctx.beginPath();
                ctx.ellipse(centerX, y, ellipseRadius, ellipseRadius * 0.3, 0, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // Draw longitude lines
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI + rotation;
                ctx.beginPath();
                ctx.ellipse(centerX, centerY, radius * Math.abs(Math.cos(angle)), radius, angle, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.stroke();
            }
            
            // Highlight
            const highlightGradient = ctx.createRadialGradient(
                centerX - radius/2, centerY - radius/2, 0,
                centerX - radius/2, centerY - radius/2, radius/3
            );
            highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            
            ctx.beginPath();
            ctx.arc(centerX - radius/2, centerY - radius/2, radius/3, 0, Math.PI * 2);
            ctx.fillStyle = highlightGradient;
            ctx.fill();
        }

        function calculateVolume(d) {
            const r = d / 2;
            const volume = (4/3) * Math.PI * Math.pow(r, 3);
            return volume.toFixed(2);
        }

        function update() {
            diameter = parseInt(slider.value);
            diameterValue.textContent = diameter;
            radiusValue.textContent = diameter / 2;
            volumeValue.textContent = calculateVolume(diameter);
            drawSphere(diameter);
        }

        // Animation
        function animate() {
            rotation += 0.01;
            drawSphere(diameter);
            requestAnimationFrame(animate);
        }

        slider.addEventListener('input', update);
        
        // Initial draw
        update();
        animate();
    </script>
</body>
</html>
